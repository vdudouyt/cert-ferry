name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cargo build --all-targets
      - run: sudo mkdir -p /etc/letsencrypt/live /etc/letsencrypt/renewal-hooks/deploy /var/log/letsencrypt
      - run: sudo chmod -R 777 /etc/letsencrypt /var/log/letsencrypt
      - run: sudo sysctl net.ipv4.ip_unprivileged_port_start=443
      - run: cargo test -- --test-threads=1
      - run: cargo clippy -- -D warnings

  release-rpm:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: almalinux:8
    steps:
      - uses: actions/checkout@v4
      - run: dnf install -y gcc make rpm-build curl
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - run: |
          . "$HOME/.cargo/env"
          cargo build --release
      - run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp target/release/certferry ~/rpmbuild/BUILD/
          cp src/certferry-renew.service ~/rpmbuild/BUILD/
          cp src/certferry-renew.timer ~/rpmbuild/BUILD/
          rpmbuild -bb --define "_version $VERSION" pkg/certferry.spec
          cp ~/rpmbuild/RPMS/x86_64/*.rpm certferry-${VERSION}.el8.x86_64.rpm
      - uses: softprops/action-gh-release@v2
        with:
          files: "*.rpm"

  release-deb:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: debian:11
    steps:
      - uses: actions/checkout@v4
      - run: apt-get update && apt-get install -y gcc make curl
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - run: |
          . "$HOME/.cargo/env"
          cargo build --release
      - run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p staging/usr/bin staging/usr/lib/systemd/system staging/DEBIAN
          cp target/release/certferry staging/usr/bin/
          strip staging/usr/bin/certferry
          sed 's|%CERTFERRY_EXE%|/usr/bin/certferry|g' src/certferry-renew.service > staging/usr/lib/systemd/system/certferry-renew.service
          cp src/certferry-renew.timer staging/usr/lib/systemd/system/
          sed "s/VERSION/$VERSION/" pkg/deb/DEBIAN/control > staging/DEBIAN/control
          dpkg-deb --build staging certferry_${VERSION}_amd64.deb
      - uses: softprops/action-gh-release@v2
        with:
          files: "*.deb"

  release-tarball:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: debian:11
    steps:
      - uses: actions/checkout@v4
      - run: apt-get update && apt-get install -y gcc make curl
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - run: |
          . "$HOME/.cargo/env"
          cargo build --release
      - run: |
          VERSION=${GITHUB_REF_NAME#v}
          strip target/release/certferry
          tar czf certferry-${VERSION}-x86_64-linux.tar.gz -C target/release certferry
      - uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"
